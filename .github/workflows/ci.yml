name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build renderer
        run: npm run build

      # Electron end-to-end smoke tests. Run on Windows, the app's target
      # platform; the renderer is already built by the previous step.
      - name: E2E (Electron)
        if: runner.os == 'Windows'
        run: npx playwright test
