name: Release

# Push a version tag (e.g. v1.1.0) to build the Windows installer and publish
# it — plus latest.yml for electron-updater — to a GitHub Release.
#
# Build and upload are deliberately decoupled: electron-builder's own GitHub
# publisher races release-creation against asset upload and can drop the large
# installer. Here electron-builder only builds (--publish never), then a
# dedicated action uploads every artifact to the release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build installer
        run: npm run release

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/NeuralChess-Setup-*.exe
            release/NeuralChess-Setup-*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: true
